version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
# BlancBleu — Orchestration complète
# Démarrage : docker-compose up --build
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: blancbleu-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?MONGO_USER must be set in .env}
      # MONGO_PASSWORD must be set in .env — no default to avoid committing credentials
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD must be set in .env}
      MONGO_INITDB_DATABASE: blancbleu
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - blancbleu-net

  # ─── Backend Node.js / Express ──────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blancbleu-server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      ia:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_USER:?MONGO_USER must be set in .env}:${MONGO_PASSWORD:?MONGO_PASSWORD must be set in .env}@mongo:27017/blancbleu?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      AI_API_URL: http://ia:5002
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${CLIENT_URL:-http://localhost:3000}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@blancbleu.fr}
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - blancbleu-net

  # ─── Module IA Python / FastAPI ──────────────────────────────────────────────
  ia:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: blancbleu-ia
    restart: unless-stopped
    environment:
      NODE_ORIGIN: http://server:5000
      ALLOWED_ORIGINS: http://server:5000,http://localhost:3000
    ports:
      - "5002:5002"
    # Port 5002 aligné avec uvicorn dans ai-service/main.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - blancbleu-net

  # ─── Frontend React (prod) ────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: blancbleu-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - blancbleu-net

volumes:
  mongo_data:
    driver: local

networks:
  blancbleu-net:
    driver: bridge
